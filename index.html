<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 3</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <section>
        <div>
            <label for="pokemons">Elige tu Pokemón</label>
            <select id="pokemons" onchange="console.log('URL seleccionada:', this.value); pokemonSelected(this.value)">
                <option value="">Select a Pokemon</option>
            </select>
        </div>

        <div id="pokemon-info">
            <h1 id="pokemon-name"></h1>   
            <div class="image-container">
                <img id="pokemon-image" alt="Pokemon">
                <div id="pokemon-type-hover" class="type-hover"></div>
            </div>
            <ul id="pokemon-stats"></ul>

            <!-- Habilidades -->
            <h2>Habilidades</h2>
            <ul id="pokemon-abilities"></ul>
        </div>
    </section>
</body>
</html>
